name: sl_product_recognition
description: Sri Lanka Supermarket Product Recognition App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Camera live stream
  camera: ^0.12.0

  # On-device TFLite inference
  tflite_flutter: ^0.12.0

  # Image decoding / YUV->RGB conversion
  image: ^4.1.7

  # State management
  provider: ^6.1.2

  # Local SQLite database (scanned products history)
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # i18n
  intl: ^0.20.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/models/
